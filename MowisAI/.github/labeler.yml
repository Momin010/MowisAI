# Labeler configuration for automatic PR labeling

orchestration:
  - agentd/src/orchestration/**/*

security:
  - agentd/src/sandbox.rs
  - agentd/src/security.rs

agents:
  - agentd/src/*_agent.rs

tools:
  - agentd/src/tools/**/*

tests:
  - agentd/tests/**/*
  - '**/*_test.rs'
  - '**/*_tests.rs'

documentation:
  - '**/*.md'
  - docs/**/*

ci-cd:
  - .github/**/*

dependencies:
  - '**/Cargo.toml'
  - '**/Cargo.lock'

performance:
  - agentd/src/orchestration/scheduler.rs
  - agentd/src/orchestration/agent_execution.rs
  - scripts/perf-gate.sh
