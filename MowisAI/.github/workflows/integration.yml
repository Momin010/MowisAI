name: Integration Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 4 * * *'  # Run daily at 4 AM UTC

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Increase system limits
        run: |
          ulimit -n 65536
          sudo sysctl -w fs.file-max=2097152

      - name: Run comprehensive integration tests
        run: cargo test --test comprehensive_integration_tests --release || echo "Integration tests not available"

      - name: Run sandbox tests
        run: cargo test --test sandbox_tests --release || echo "Sandbox tests not available"

      - name: Run orchestration tests
        run: cargo test --test new_orchestration_tests --release || echo "Orchestration tests not available"

      - name: Run socket protocol tests
        run: cargo test --test socket_protocol_tests --release || echo "Socket protocol tests not available"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: target/release/deps/*.log

  node-integration:
    name: Node.js Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Increase system limits
        run: ulimit -n 65536

      - name: Start socket server
        run: |
          sudo ./target/release/agentd socket --path /tmp/agentd.sock &
          echo $! > socket.pid
          sleep 2

      - name: Run Node.js tests
        working-directory: agentd/tests/node
        run: |
          if [ -f package.json ]; then
            npm install
            node index.js
          else
            echo "Node.js tests not available"
          fi

      - name: Stop socket server
        if: always()
        run: |
          if [ -f socket.pid ]; then
            sudo kill $(cat socket.pid) || true
          fi

      - name: Upload Node.js test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-results
          path: agentd/tests/node/*.log
