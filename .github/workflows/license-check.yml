name: License Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  license-check:
    name: Check License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-license
        run: cargo install cargo-license --locked

      - name: Check dependencies licenses
        run: |
          cargo license --json > licenses.json || echo "License check failed, continuing..."
          if [ -f licenses.json ]; then
            cat licenses.json
            
            # Check for incompatible licenses
            if grep -q "GPL" licenses.json; then
              echo "❌ GPL license detected in dependencies"
              exit 1
            fi
            
            echo "✅ All dependency licenses are compatible with MIT"
          else
            echo "⚠️ Could not generate license report"
          fi

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.json

  reuse-compliance:
    name: REUSE Compliance Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v3
        continue-on-error: true
