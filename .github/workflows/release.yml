build-desktop:
    name: Build Desktop App
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Cites the need for specific targets based on platform
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || 'x86_64-pc-windows-msvc' }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: mowis-desktop/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: mowis-desktop

      - name: Build desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          working-directory: mowis-desktop
          # Properly isolates the desktop crate from the Linux-only workspace members
          args: "--package mowis-desktop"

      - name: Upload Desktop Assets (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          # Finds dmg files in the standard Tauri output directory
          for file in mowis-desktop/src-tauri/target/release/bundle/dmg/*.dmg; do
            if [[ -f "$file" ]]; then
              gh release upload ${{ needs.create-release.outputs.version }} "$file" --clobber
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Desktop Assets (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Uses PowerShell for native Windows path globbing
          Get-ChildItem -Path "mowis-desktop/src-tauri/target/release/bundle/msi/*.msi" | ForEach-Object {
            gh release upload ${{ needs.create-release.outputs.version }} $_.FullName --clobber
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}