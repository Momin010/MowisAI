name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Linux — static musl agentd + native mowisai GUI
  # ---------------------------------------------------------------------------
  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: linux-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Install musl tools
        run: sudo apt-get install -y musl-tools

      - name: Build agentd (static musl)
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --release --target x86_64-unknown-linux-musl -p agentd

      - name: Build mowisai GUI (Linux)
        run: cargo build --release -p mowis-gui

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/agentd dist/agentd-linux-x86_64
          cp target/release/mowisai dist/mowisai-linux-x86_64

      - name: Upload mowisai Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: mowisai-linux-x86_64
          path: dist/mowisai-linux-x86_64
          if-no-files-found: error

      - name: Upload agentd static artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentd-linux-x86_64-musl
          path: dist/agentd-linux-x86_64
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # macOS — Intel (x86_64) and Apple Silicon (arm64)
  # ---------------------------------------------------------------------------
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            arch_label: x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            arch_label: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: macos-${{ matrix.arch_label }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            macos-${{ matrix.arch_label }}-cargo-

      - name: Build mowisai GUI
        run: cargo build --release --target ${{ matrix.target }} -p mowis-gui

      - name: Create .app bundle
        run: |
          APP_NAME="MowisAI"
          BUNDLE_ID="com.mowisai.app"
          VERSION="$(cargo metadata --no-deps --format-version 1 \
            | python3 -c "import sys,json; pkgs=json.load(sys.stdin)['packages']; \
              print(next(p['version'] for p in pkgs if p['name']=='mowis-gui'))")"
          DIST_DIR="dist"
          APP_BUNDLE="${DIST_DIR}/${APP_NAME}.app"
          MACOS_DIR="${APP_BUNDLE}/Contents/MacOS"
          RESOURCES_DIR="${APP_BUNDLE}/Contents/Resources"

          mkdir -p "${MACOS_DIR}" "${RESOURCES_DIR}"

          cp "target/${{ matrix.target }}/release/mowisai" "${MACOS_DIR}/mowisai"
          chmod +x "${MACOS_DIR}/mowisai"

          # Icon — use real asset if present, otherwise create placeholder
          if [[ -f "assets/AppIcon.icns" ]]; then
            cp "assets/AppIcon.icns" "${RESOURCES_DIR}/AppIcon.icns"
          else
            touch "${RESOURCES_DIR}/AppIcon.icns"
          fi

          cat > "${APP_BUNDLE}/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>mowisai</string>
            <key>CFBundleIdentifier</key><string>${BUNDLE_ID}</string>
            <key>CFBundleName</key><string>${APP_NAME}</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>CFBundleIconFile</key><string>AppIcon</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSMinimumSystemVersion</key><string>10.15</string>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "MowisAI" \
            -srcfolder "dist/MowisAI.app" \
            -ov \
            -format UDZO \
            "dist/MowisAI-${{ matrix.target }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MowisAI-${{ matrix.target }}-dmg
          path: dist/MowisAI-${{ matrix.target }}.dmg
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Windows — native mowisai.exe
  # ---------------------------------------------------------------------------
  build-windows:
    name: Build Windows
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: windows-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Build mowisai GUI
        run: cargo build --release -p mowis-gui

      - name: Upload mowisai.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: mowisai-windows-x86_64
          path: target/release/mowisai.exe
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Release — collect all artifacts and publish a GitHub release
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-22.04

    steps:
      - name: Download mowisai Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: mowisai-linux-x86_64
          path: release-artifacts

      - name: Download agentd static artifact
        uses: actions/download-artifact@v4
        with:
          name: agentd-linux-x86_64-musl
          path: release-artifacts

      - name: Download macOS Intel DMG
        uses: actions/download-artifact@v4
        with:
          name: MowisAI-x86_64-apple-darwin-dmg
          path: release-artifacts

      - name: Download macOS Apple Silicon DMG
        uses: actions/download-artifact@v4
        with:
          name: MowisAI-aarch64-apple-darwin-dmg
          path: release-artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: mowisai-windows-x86_64
          path: release-artifacts

      - name: List release artifacts
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/mowisai-linux-x86_64
            release-artifacts/agentd-linux-x86_64
            release-artifacts/MowisAI-x86_64-apple-darwin.dmg
            release-artifacts/MowisAI-aarch64-apple-darwin.dmg
            release-artifacts/mowisai.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
