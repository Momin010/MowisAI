name: Nightly Build

on:
  schedule:
    # Run every night at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  nightly-test:
    name: Nightly Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-nightly-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-nightly-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-nightly-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Run tests with nightly
        run: cargo +nightly test --all-features --workspace
        continue-on-error: true

      - name: Check for future incompatibilities
        run: cargo +nightly check --all-features --workspace
        continue-on-error: true

  miri:
    name: Miri (Undefined Behavior Detection)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust nightly with Miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri

      - name: Run Miri
        run: cargo +nightly miri test
        continue-on-error: true
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

  fuzz:
    name: Fuzzing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked || echo "cargo-fuzz installation failed"

      - name: Run fuzzing (5 minutes per target)
        run: |
          if [ -d fuzz ] && command -v cargo-fuzz >/dev/null 2>&1; then
            for target in $(cargo fuzz list 2>/dev/null || echo ""); do
              if [ -n "$target" ]; then
                timeout 300 cargo +nightly fuzz run $target || true
              fi
            done
          else
            echo "Fuzzing not available"
          fi
        continue-on-error: true

  stress-test:
    name: Stress Test (10000 tasks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release --workspace

      - name: Increase system limits
        run: |
          ulimit -n 65536
          sudo sysctl -w fs.file-max=2097152

      - name: Create test directory
        run: mkdir -p /tmp/stress-test-project

      - name: Run stress test
        run: |
          sudo ./target/release/agentd socket --path /tmp/agentd.sock &
          SOCKET_PID=$!
          sleep 2
          
          ./target/release/agentd simulate \
            --socket /tmp/agentd.sock \
            --project-root /tmp/stress-test-project \
            --max-agents 2000 \
            --tasks 10000 \
            --verify > stress_output.txt 2>&1 || true
          
          sudo kill $SOCKET_PID || true
          cat stress_output.txt
        continue-on-error: true

      - name: Upload stress test results
        uses: actions/upload-artifact@v7
        with:
          name: stress-test-results
          path: stress_output.txt

  notify:
    name: Notify on Failure
    needs: [nightly-test, miri, fuzz, stress-test]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly build failed - ${new Date().toISOString().split('T')[0]}`;
            const body = `The nightly build has failed. Please investigate.
            
            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            **Failed Jobs:**
            ${context.payload.workflow_run?.conclusion === 'failure' ? '- All jobs failed' : '- Some jobs failed'}
            
            cc @mowisai/core-team`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['nightly-failure', 'bug']
            });
