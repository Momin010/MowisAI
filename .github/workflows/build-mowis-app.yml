name: Build MowisAI App (Windows)

on:
  workflow_dispatch:
  push:
    tags: ['app-v*']
    paths:
      - 'mowis-app/**'
      - 'opencode-main/**'

jobs:
  # ── Job 1: compile opencode for Windows (Go binary) ─────────────────────
  build-opencode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build opencode (Windows amd64)
        working-directory: opencode-main
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -o opencode.exe .

      - name: Upload opencode binary
        uses: actions/upload-artifact@v4
        with:
          name: opencode-windows
          path: opencode-main/opencode.exe
          retention-days: 1

  # ── Job 2: build the Tauri Windows installer ──────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: [build-opencode]
    defaults:
      run:
        working-directory: mowis-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (MSVC target)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node deps
        run: npm install

      # Download the opencode Windows binary
      - name: Download opencode binary
        uses: actions/download-artifact@v4
        with:
          name: opencode-windows
          path: mowis-app/src-tauri/resources

      - name: Verify opencode binary exists
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri\resources\opencode.exe")) {
            Write-Error "opencode.exe not found in resources"
            exit 1
          }
          Write-Host "opencode.exe found"
          & "src-tauri\resources\opencode.exe" --help 2>&1 | Select-Object -First 3

      - name: Build Tauri NSIS installer
        run: npx tauri build --ci --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: mowis-app-windows-installer
          path: mowis-app/src-tauri/target/release/bundle/nsis/*.exe
