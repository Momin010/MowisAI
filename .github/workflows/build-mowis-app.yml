name: Build MowisAI App (Windows)

on:
  workflow_dispatch:
  push:
    tags: ['app-v*']
    paths:
      - 'mowis-app/**'
      - 'mowis-agent/**'

jobs:
  # ── Job 1: compile mowis-agent for Windows (Go binary) ─────────────────────
  build-mowis-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build mowis-agent (Windows amd64)
        working-directory: mowis-agent
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -tags headless -o mowis-agent.exe .

      - name: Upload mowis-agent binary
        uses: actions/upload-artifact@v4
        with:
          name: mowis-agent-windows
          path: mowis-agent/mowis-agent.exe
          retention-days: 1

  # ── Job 2: build the Tauri Windows installer ──────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: [build-mowis-agent]
    defaults:
      run:
        working-directory: mowis-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (MSVC target)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node deps
        run: npm install

      # Download the mowis-agent Windows binary
      - name: Download mowis-agent binary
        uses: actions/download-artifact@v4
        with:
          name: mowis-agent-windows
          path: mowis-app/src-tauri/resources

      - name: Verify mowis-agent binary exists
        shell: pwsh
        run: |
          if (-not (Test-Path "src-tauri\resources\mowis-agent.exe")) {
            Write-Error "mowis-agent.exe not found in resources"
            exit 1
          }
          Write-Host "mowis-agent.exe found"
          & "src-tauri\resources\mowis-agent.exe" --help 2>&1 | Select-Object -First 3

      - name: Build Tauri NSIS installer
        run: npx tauri build --ci --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: mowis-app-windows-installer
          path: mowis-app/src-tauri/target/release/bundle/nsis/*.exe
