name: CI

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: cargo check
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ci-check-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ci-check-cargo-

      - name: cargo check
        run: cargo check --workspace

  clippy:
    name: cargo clippy
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable) with clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ci-clippy-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ci-clippy-cargo-

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ci-test-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ci-test-cargo-

      - name: cargo test
        run: cargo test --workspace
