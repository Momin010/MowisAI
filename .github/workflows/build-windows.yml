name: Build Mowis Desktop (Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mowis-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Node deps
        run: npm install

      - name: Build
        run: npx tauri build --ci --bundles nsis

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mowis-windows-installer
          path: target/release/bundle/nsis/*.exe
