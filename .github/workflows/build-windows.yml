name: Build MowisAI Desktop (Windows)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  # ── Job 1: compile agentd for Linux x86_64 (musl static binary) ─────────────
  # Runs on Ubuntu so we can use the musl toolchain without cross-compilation
  # complexity on the Windows runner.
  build-agentd-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl linker
        # musl-tools provides musl-gcc needed to link the static binary.
        # No OpenSSL headers required — reqwest uses rustls (pure Rust TLS).
        run: sudo apt-get install -y musl-tools

      - name: Build agentd (static Linux binary)
        # Run from workspace root so cargo uses the workspace target/ dir.
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl -p agentd

      - name: Upload agentd binary
        uses: actions/upload-artifact@v4
        with:
          name: agentd-linux-x86_64
          # Workspace root Cargo.toml → target/ is at the repo root, not agentd/target/
          path: target/x86_64-unknown-linux-musl/release/agentd
          retention-days: 1

  # ── Job 2: build the Tauri Windows installer ──────────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: build-agentd-linux
    defaults:
      run:
        working-directory: mowis-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (MSVC target)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node deps
        run: npm install

      # Download the Linux agentd binary and place it in the Tauri resources
      # directory so tauri.conf.json can bundle it into the NSIS installer.
      - name: Download agentd Linux binary
        uses: actions/download-artifact@v4
        with:
          name: agentd-linux-x86_64
          path: mowis-desktop/src-tauri/resources

      - name: Rename agentd binary to expected name
        shell: pwsh
        run: |
          $src = "src-tauri\resources\agentd"
          $dst = "src-tauri\resources\agentd-linux-x86_64"
          if (Test-Path $src) { Move-Item $src $dst }

      - name: Build Tauri NSIS installer
        run: npx tauri build --ci --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: mowis-windows-installer
          # Path is relative to GITHUB_WORKSPACE (repo root), not working-directory
          path: mowis-desktop/src-tauri/target/release/bundle/nsis/*.exe
