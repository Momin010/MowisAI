name: Build MowisAI Desktop (Windows)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  # ── Job 1: compile agentd for Linux x86_64 (musl static binary) ─────────────
  build-agentd-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl linker
        run: sudo apt-get install -y musl-tools

      - name: Build agentd (static Linux binary)
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build --release --target x86_64-unknown-linux-musl -p agentd

      - name: Upload agentd binary
        uses: actions/upload-artifact@v4
        with:
          name: agentd-linux-x86_64
          path: target/x86_64-unknown-linux-musl/release/agentd
          retention-days: 1

  # ── Job 2: compile mowis-agent for Windows (Go binary) ─────────────────────
  build-mowis-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build mowis-agent (Windows amd64)
        working-directory: mowis-agent
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: go build -tags headless -o mowis-agent.exe .

      - name: Upload mowis-agent binary
        uses: actions/upload-artifact@v4
        with:
          name: mowis-agent-windows
          path: mowis-agent/mowis-agent.exe
          retention-days: 1

  # ── Job 3: build the Tauri Windows installer ──────────────────────────────
  build-windows:
    runs-on: windows-latest
    needs: [build-agentd-linux, build-mowis-agent]
    defaults:
      run:
        working-directory: mowis-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (MSVC target)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node deps
        run: npm install

      # Download the Linux agentd binary
      - name: Download agentd Linux binary
        uses: actions/download-artifact@v4
        with:
          name: agentd-linux-x86_64
          path: mowis-desktop/src-tauri/resources

      - name: Rename agentd binary to expected name
        shell: pwsh
        run: |
          $src = "src-tauri\resources\agentd"
          $dst = "src-tauri\resources\agentd-linux-x86_64"
          if (Test-Path $src) { Move-Item $src $dst }

      # Download the mowis-agent Windows binary
      - name: Download mowis-agent binary
        uses: actions/download-artifact@v4
        with:
          name: mowis-agent-windows
          path: mowis-desktop/src-tauri/resources

      - name: Fetch Alpine rootfs
        shell: bash
        run: |
          cd src-tauri/resources
          bash fetch-resources.sh

      - name: Build Tauri NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --ci --bundles nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: mowis-windows-installer
          path: target/release/bundle/nsis/*.exe

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mowis-updater-artifacts
          path: |
            target/release/bundle/nsis/*.nsis.zip
            target/release/bundle/nsis/*.nsis.zip.sig

  # ── Job 4: create GitHub Release with updater artifacts ─────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: mowis-windows-installer
          path: release-assets

      - name: Download updater artifacts
        uses: actions/download-artifact@v4
        with:
          name: mowis-updater-artifacts
          path: release-assets

      - name: Read version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json for updater
        shell: bash
        run: |
          cd release-assets
          SIG_FILE=$(ls *.nsis.zip.sig 2>/dev/null | head -1)
          ZIP_FILE=$(ls *.nsis.zip 2>/dev/null | head -1)
          if [ -z "$SIG_FILE" ] || [ -z "$ZIP_FILE" ]; then
            echo "ERROR: Missing updater artifacts"
            exit 1
          fi
          SIGNATURE=$(cat "$SIG_FILE")
          TAG="v${{ steps.version.outputs.VERSION }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_FILE}"
          cat > latest.json <<ENDJSON
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "notes": "MowisAI Desktop ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          ENDJSON
          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MowisAI Desktop ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release-assets/*.exe
            release-assets/*.nsis.zip
            release-assets/*.nsis.zip.sig
            release-assets/latest.json
