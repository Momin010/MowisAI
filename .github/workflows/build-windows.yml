name: Build MowisAI Desktop (Windows)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: mowis-desktop

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust (MSVC target)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node deps
        run: npm install

      - name: Build Tauri NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build --ci --bundles nsis

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $exe = "..\target\release\mowis-desktop.exe"
          if (Test-Path $exe) {
            Compress-Archive -Path $exe -DestinationPath "..\target\release\MowisAI-portable.zip"
          } else {
            Write-Error "EXE not found at $exe"
            exit 1
          }

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: mowis-windows-installer
          path: target/release/bundle/nsis/*.exe

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: mowis-windows-portable
          path: target/release/MowisAI-portable.zip

      - name: Upload updater signature
        if: ${{ env.TAURI_SIGNING_PRIVATE_KEY != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: mowis-updater-sig
          path: target/release/bundle/nsis/*.exe.sig

  release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: mowis-windows-installer
          path: release-assets

      - name: Download portable ZIP
        uses: actions/download-artifact@v4
        with:
          name: mowis-windows-portable
          path: release-assets

      - name: Download updater signature
        uses: actions/download-artifact@v4
        with:
          name: mowis-updater-sig
          path: release-assets
        continue-on-error: true

      - name: Read version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json for updater
        shell: bash
        run: |
          cd release-assets
          SIG_FILE=$(ls *.exe.sig 2>/dev/null | head -1)
          EXE_FILE=$(ls *.exe 2>/dev/null | head -1)
          if [ -z "$SIG_FILE" ] || [ -z "$EXE_FILE" ]; then
            echo "No updater sig found, skipping latest.json"
            exit 0
          fi
          SIGNATURE=$(cat "$SIG_FILE")
          TAG="v${{ steps.version.outputs.VERSION }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${EXE_FILE}"
          cat > latest.json <<ENDJSON
          {
            "version": "${{ steps.version.outputs.VERSION }}",
            "notes": "MowisAI Desktop ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${SIGNATURE}",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          ENDJSON
          echo "Generated latest.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MowisAI Desktop ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release-assets/*.exe
            release-assets/*.zip
            release-assets/*.exe.sig
            release-assets/latest.json
