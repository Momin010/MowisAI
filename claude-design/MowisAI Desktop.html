<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MowisAI · Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Tinos:ital,wght@0,400;0,700;1,400;1,700&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { background: #1a1a1a; }
  /* Apply tweak overrides to the doc */
  body.t-georgia { --serif: 'Georgia', 'Tinos', 'Times New Roman', serif; }
  body.t-times { --serif: '"Times New Roman"', 'Times', 'Tinos', serif; }
  body.t-tinos { --serif: 'Tinos', 'Georgia', 'Times New Roman', serif; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens-a.jsx"></script>
<script type="text/babel" src="screens-b.jsx"></script>
<script type="text/babel" data-presets="env,react">
const { useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "font": "times",
  "blueHue": 260,
  "blurStart": 75,
  "panelSide": "left",
  "density": "balanced",
  "agentCount": 1
}/*EDITMODE-END*/;

function applyTweaks(t) {
  document.body.classList.remove('t-tinos','t-georgia','t-times');
  document.body.classList.add('t-' + t.font);
  // Blue hue: keep chroma/lightness consistent. The CSS uses oklch via fallback —
  // we just rewrite --blue and --blue-glow to vary hue.
  const root = document.documentElement;
  const hue = t.blueHue;
  // Use HSL because all browsers handle it; saturation 100, lightness 60.
  root.style.setProperty('--blue', `hsl(${hue}, 100%, 60%)`);
  root.style.setProperty('--blue-glow', `hsla(${hue}, 100%, 60%, 0.55)`);
  root.style.setProperty('--blue-soft', `hsla(${hue}, 100%, 60%, 0.18)`);
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  useEffect(() => { applyTweaks(tweaks); }, [tweaks]);

  // Common props passed to session screens (which read tweaks).
  const sp = {
    panelSide: tweaks.panelSide,
    density: tweaks.density,
    agentCount: tweaks.agentCount,
    blur: tweaks.blurStart,
  };

  return (
    <>
      <DesignCanvas>
        <DCSection id="a" title="A · Quiet" subtitle="Editorial calm — gray tile fleet, soft hierarchy, blur ambience">
          <DCArtboard id="a-welcome" label="Welcome" width={1280} height={800}>
            <WelcomeScreen blur={sp.blur}/>
          </DCArtboard>
          <DCArtboard id="a-home" label="Home" width={1280} height={800}>
            <HomeScreen/>
          </DCArtboard>
          <DCArtboard id="a-spawn" label="New session" width={1280} height={800}>
            <SpawnScreen/>
          </DCArtboard>
          <DCArtboard id="a-session" label="Active session" width={1280} height={800}>
            <SessionScreen panelSide={sp.panelSide} density={sp.density} agentCount={sp.agentCount}/>
          </DCArtboard>
          <DCArtboard id="a-agent" label="Single agent" width={1280} height={800}>
            <AgentDetailScreen/>
          </DCArtboard>
          <DCArtboard id="a-sandboxes" label="Sandboxes" width={1280} height={800}>
            <SandboxesScreen/>
          </DCArtboard>
          <DCArtboard id="a-timeline" label="Timeline" width={1280} height={800}>
            <TimelineScreen/>
          </DCArtboard>
          <DCArtboard id="a-settings" label="Settings" width={1280} height={800}>
            <SettingsScreen/>
          </DCArtboard>
        </DCSection>
        <DCSection id="b" title="B · Composed" subtitle="Editorial grid — magazine register, Roman numerals, hairline structure">
          <DCArtboard id="b-welcome" label="Welcome" width={1280} height={800}>
            <WelcomeScreenB blur={sp.blur}/>
          </DCArtboard>
          <DCArtboard id="b-home" label="Home" width={1280} height={800}>
            <HomeScreenB/>
          </DCArtboard>
          <DCArtboard id="b-spawn" label="New session" width={1280} height={800}>
            <SpawnScreenB/>
          </DCArtboard>
          <DCArtboard id="b-session" label="Active session" width={1280} height={800}>
            <SessionScreenB panelSide={sp.panelSide} density={sp.density} agentCount={sp.agentCount}/>
          </DCArtboard>
          <DCArtboard id="b-agent" label="Single agent" width={1280} height={800}>
            <AgentDetailScreenB/>
          </DCArtboard>
          <DCArtboard id="b-sandboxes" label="Sandboxes" width={1280} height={800}>
            <SandboxesScreenB/>
          </DCArtboard>
          <DCArtboard id="b-timeline" label="Timeline" width={1280} height={800}>
            <TimelineScreenB/>
          </DCArtboard>
          <DCArtboard id="b-settings" label="Settings" width={1280} height={800}>
            <SettingsScreenB/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Type">
          <TweakRadio
            label="Serif"
            value={tweaks.font}
            options={[
              { value: 'tinos', label: 'Tinos' },
              { value: 'georgia', label: 'Georgia' },
              { value: 'times', label: 'Times' },
            ]}
            onChange={v => setTweak('font', v)}
          />
        </TweakSection>
        <TweakSection title="Blue accent">
          <TweakSlider label="Hue" min={180} max={260} step={1} value={tweaks.blueHue} onChange={v => setTweak('blueHue', v)}/>
        </TweakSection>
        <TweakSection title="Welcome">
          <TweakSlider label="Initial blur (px)" min={4} max={120} step={1} value={tweaks.blurStart} onChange={v => setTweak('blurStart', v)}/>
        </TweakSection>
        <TweakSection title="Agents panel">
          <TweakRadio
            label="Position"
            value={tweaks.panelSide}
            options={[
              { value: 'left', label: 'Left' },
              { value: 'right', label: 'Right' },
            ]}
            onChange={v => setTweak('panelSide', v)}
          />
          <TweakRadio
            label="Density"
            value={tweaks.density}
            options={[
              { value: 'sparse', label: 'Sparse' },
              { value: 'balanced', label: 'Balanced' },
              { value: 'dense', label: 'Dense' },
            ]}
            onChange={v => setTweak('density', v)}
          />
          <TweakSlider label="Active agents" min={1} max={12} step={1} value={tweaks.agentCount} onChange={v => setTweak('agentCount', v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
