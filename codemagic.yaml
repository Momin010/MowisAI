workflows:
  tauri-macos-universal:
    name: Mowis Desktop Universal (Tauri v2)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
    scripts:
      - name: Setup Rust
        script: |
          # Install Rustup and Rust
          curl --proto '=https' --tlsv1.2 -sSf https://rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          
          # Add macOS targets
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      
      - name: Install Dependencies
        script: |
          cd mowis-desktop
          npm install
          
      - name: Build Tauri Universal
        script: |
          # Ensure Rust environment is available in this step too
          source $HOME/.cargo/env
          
          cd mowis-desktop
          npx tauri build --ci --bundles dmg --target universal
    artifacts:
      - mowis-desktop/src-tauri/target/**/bundle/dmg/*.dmg
