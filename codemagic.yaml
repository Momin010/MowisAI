workflows:
  tauri-macos-universal:
    name: Mowis Desktop Universal (Tauri v2)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
      vars:
        # Manually force the Cargo path into the system PATH
        PATH: "$PATH:$HOME/.cargo/bin"
    scripts:
      - name: Setup Rust Targets
        script: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      
      - name: Install Dependencies
        script: |
          cd mowis-desktop
          npm install
          
      - name: Build Tauri Universal
        script: |
          cd mowis-desktop
          npx tauri build --ci --bundles dmg --target universal
    artifacts:
      - mowis-desktop/src-tauri/target/**/bundle/dmg/*.dmg
