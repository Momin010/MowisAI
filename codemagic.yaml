workflows:
  tauri-macos-universal:
    name: Mowis Desktop Universal (Tauri v2)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
    scripts:
      - name: Build Universal App
        script: |
          # 1. Setup Rust
          brew install rustup
          rustup-init -y --no-modify-path
          source $HOME/.cargo/env
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
          
          # 2. Install Node Deps
          cd mowis-desktop
          npm install
          
          # 3. Run Build using the correct v2 universal flag
          npx tauri build --ci --bundles dmg --universal
    artifacts:
      - mowis-desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
