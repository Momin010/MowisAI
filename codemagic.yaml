workflows:
  tauri-macos-universal:
    name: Mowis Desktop Universal (Tauri v2)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
      vars:
        CARGO_HOME: $HOME/.cargo
    scripts:
      - name: Install Rust and musl target
        script: |
          brew install rustup
          rustup-init -y --no-modify-path
          source $HOME/.cargo/env
          rustup target add x86_64-unknown-linux-musl
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      
      - name: Install musl cross-compilation tools
        script: |
          brew install filosottile/musl-cross/musl-cross
      
      - name: Build agentd Linux binary (static musl)
        script: |
          source $HOME/.cargo/env
          export CC_x86_64_unknown_linux_musl=x86_64-linux-musl-gcc
          export CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=x86_64-linux-musl-gcc
          cargo build --release --target x86_64-unknown-linux-musl -p agentd
      
      - name: Copy agentd to resources
        script: |
          mkdir -p mowis-desktop/src-tauri/resources
          cp target/x86_64-unknown-linux-musl/release/agentd mowis-desktop/src-tauri/resources/agentd-linux-x86_64
      
      - name: Fetch Alpine rootfs
        script: |
          cd mowis-desktop/src-tauri/resources
          chmod +x fetch-resources.sh
          bash fetch-resources.sh
      
      - name: Install Node dependencies
        script: |
          cd mowis-desktop
          npm install
      
      - name: Build macOS Universal DMG
        script: |
          source $HOME/.cargo/env
          cd mowis-desktop
          npx tauri build --ci --bundles dmg --target universal-apple-darwin
    artifacts:
      - "target/universal-apple-darwin/release/bundle/dmg/*.dmg"

  tauri-windows:
    name: Mowis Desktop Windows (Tauri v2)
    instance_type: windows_x2
    max_build_duration: 120
    environment:
      node: latest
    scripts:
      - name: Build Windows App
        script: |
          Invoke-WebRequest -Uri "https://win.rustup.rs" -OutFile "rustup-init.exe"
          .\rustup-init.exe -y --no-modify-path
          $env:PATH += ";$env:USERPROFILE\.cargo\bin"
          rustup target add x86_64-pc-windows-msvc

          cd mowis-desktop
          npm install

          npx tauri build --ci --bundles nsis
    artifacts:
      - "**/*.exe"
      - "**/*.msi"
