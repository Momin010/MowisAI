workflows:
  tauri-macos-universal:
    name: Mowis Desktop Universal (Tauri v2)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
    scripts:
      - name: Build Universal App
        script: |
          brew install rustup
          rustup-init -y --no-modify-path
          source $HOME/.cargo/env
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

          cd mowis-desktop
          npm install

          npx tauri build --ci --bundles dmg --target aarch64-apple-darwin
          npx tauri build --ci --bundles dmg --target x86_64-apple-darwin
    artifacts:
      - "**/*.dmg"

  tauri-windows:
    name: Mowis Desktop Windows (Tauri v2)
    instance_type: windows_x2
    max_build_duration: 120
    environment:
      node: latest
    scripts:
      - name: Build Windows App
        script: |
          Invoke-WebRequest -Uri "https://win.rustup.rs" -OutFile "rustup-init.exe"
          .\rustup-init.exe -y --no-modify-path
          $env:PATH += ";$env:USERPROFILE\.cargo\bin"
          rustup target add x86_64-pc-windows-msvc

          cd mowis-desktop
          npm install

          npx tauri build --ci --bundles nsis
    artifacts:
      - "**/*.exe"
      - "**/*.msi"