workflows:
  tauri-macos-universal:
    name: Mowis Desktop Universal (Tauri v2)
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      node: latest
    scripts:
      - name: Setup Rust
        script: |
          rustup default stable
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      
      - name: Install Dependencies
        script: |
          cd mowis-desktop
          npm install
          
      - name: Build Tauri Universal
        script: |
          cd mowis-desktop
          # npx tauri build handles the 'beforeBuildCommand' automatically
          npx tauri build --ci --bundles dmg --target universal
    artifacts:
      - mowis-desktop/src-tauri/target/**/bundle/dmg/*.dmg
